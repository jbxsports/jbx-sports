<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Área — JBX Sports</title>
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,400;0,500;0,700;1,400;1,700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
:root {
  --orange: #ff751f;
  --orange-dark: #e05a08;
  --black: #0a0a0a;
  --white: #ffffff;
  --bg-card: #1a1a1a;
  --bg-dark: #111111;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Ubuntu', sans-serif; background: var(--black); color: var(--white); min-height: 100vh; }

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 5%; height: 70px;
  background: rgba(10,10,10,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,117,31,0.15);
}
.nav-logo { text-decoration: none; display: flex; align-items: center; }
.nav-user { display: flex; align-items: center; gap: 16px; }
.nav-user-name { font-size: 14px; color: rgba(255,255,255,0.7); }
.btn-logout {
  background: transparent; color: rgba(255,255,255,0.6);
  border: 1px solid rgba(255,255,255,0.2); border-radius: 6px;
  padding: 8px 16px; font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: 'Ubuntu', sans-serif; transition: all 0.2s;
}
.btn-logout:hover { border-color: #fff; color: #fff; }

/* TELAS */
.screen { display: none; min-height: 100vh; padding-top: 70px; }
.screen.active { display: flex; align-items: center; justify-content: center; padding: 90px 20px 40px; }
#screen-area { align-items: flex-start; justify-content: flex-start; padding: 90px 5% 60px; }

/* CARD AUTH */
.auth-card {
  background: #171717; border-radius: 16px; width: 100%; max-width: 420px;
  padding: 40px 36px; border: 1px solid rgba(255,117,31,0.2);
}
.auth-logo { display: flex; justify-content: center; margin-bottom: 28px; }
.auth-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; text-align: center; }
.auth-sub { font-size: 14px; color: rgba(255,255,255,0.5); text-align: center; margin-bottom: 28px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 6px; font-weight: 500; }
.form-group input {
  width: 100%; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
  padding: 12px 14px; color: white; font-size: 15px; font-family: 'Ubuntu', sans-serif;
  transition: border-color 0.2s;
}
.form-group input:focus { outline: none; border-color: var(--orange); background: rgba(255,117,31,0.05); }
.form-group input::placeholder { color: rgba(255,255,255,0.25); }
.btn-auth {
  width: 100%; background: var(--orange); color: white;
  padding: 14px; border-radius: 8px; border: none;
  font-size: 16px; font-weight: 700; cursor: pointer;
  font-family: 'Ubuntu', sans-serif; transition: all 0.2s; margin-top: 8px;
}
.btn-auth:hover { background: var(--orange-dark); transform: translateY(-1px); }
.btn-auth:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
.auth-switch {
  text-align: center; margin-top: 20px; font-size: 14px;
  color: rgba(255,255,255,0.5);
}
.auth-switch a { color: var(--orange); cursor: pointer; text-decoration: none; font-weight: 600; }
.auth-switch a:hover { text-decoration: underline; }
.auth-erro {
  background: rgba(255,60,60,0.1); border: 1px solid rgba(255,60,60,0.3);
  border-radius: 8px; padding: 12px 14px; font-size: 14px; color: #ff6b6b;
  margin-bottom: 16px; display: none;
}
.auth-erro.show { display: block; }

/* ÁREA DO ATLETA */
.area-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 36px; flex-wrap: wrap; gap: 16px;
}
.area-header h1 { font-size: 28px; font-weight: 700; }
.area-header h1 span { color: var(--orange); }
.area-subtitulo { font-size: 14px; color: rgba(255,255,255,0.5); margin-top: 4px; }

.inscricoes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }

.insc-card {
  background: var(--bg-card); border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.07);
  overflow: hidden; transition: border-color 0.2s;
}
.insc-card:hover { border-color: rgba(255,117,31,0.3); }

.insc-card-top {
  padding: 20px 22px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.insc-evento { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
.insc-status {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700;
  letter-spacing: 0.5px; text-transform: uppercase;
}
.status-confirmado { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
.status-pendente   { background: rgba(255,193,7,0.15);  color: #ffc107; border: 1px solid rgba(255,193,7,0.3); }
.status-cancelado  { background: rgba(239,68,68,0.15);  color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }

.insc-detalhes { padding: 16px 22px; }
.insc-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
  font-size: 13px;
}
.insc-row:last-child { border-bottom: none; }
.insc-label { color: rgba(255,255,255,0.45); }
.insc-val { font-weight: 600; color: rgba(255,255,255,0.9); text-align: right; }
.insc-val.orange { color: var(--orange); }

.insc-qr {
  padding: 16px 22px 20px;
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex; flex-direction: column; align-items: center; gap: 12px;
}
.insc-qr-titulo {
  font-size: 11px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: rgba(255,255,255,0.4);
  align-self: flex-start;
}
.qr-wrap {
  background: white; border-radius: 10px; padding: 12px;
  display: flex; align-items: center; justify-content: center;
}
.qr-id {
  font-size: 11px; color: rgba(255,255,255,0.3);
  font-family: monospace; letter-spacing: 1px;
}

.vazio {
  grid-column: 1/-1; text-align: center; padding: 64px 20px;
  color: rgba(255,255,255,0.3);
}
.vazio-icone { font-size: 48px; margin-bottom: 16px; }
.vazio-texto { font-size: 16px; }

/* loading */
.loading-wrap { text-align: center; padding: 60px; color: rgba(255,255,255,0.4); }
.spinner {
  width: 36px; height: 36px; border-radius: 50%;
  border: 3px solid rgba(255,117,31,0.2); border-top-color: var(--orange);
  animation: spin 0.8s linear infinite; margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 600px) {
  .inscricoes-grid { grid-template-columns: 1fr; }
  .auth-card { padding: 28px 20px; }
  #screen-area { padding: 90px 16px 40px; }
}
</style>

<script>
const SB_URL = 'https://acxfzdtzxaahsqnlxdgw.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFjeGZ6ZHR6eGFhaHNxbmx4ZGd3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1Njc5NTAsImV4cCI6MjA5NjE0Mzk1MH0.uZ_G55BKmV24tn62ZmjjFzYxtBypoq7OLWjTMmKfRRk';

// ── SESSÃO ──────────────────────────────────────
let sessao = null;

function salvarSessao(dados) {
  sessao = dados;
  localStorage.setItem('jbx_atleta', JSON.stringify(dados));
}
function carregarSessao() {
  try { return JSON.parse(localStorage.getItem('jbx_atleta')); } catch { return null; }
}
function logout() {
  localStorage.removeItem('jbx_atleta');
  sessao = null;
  mostrarTela('login');
  document.getElementById('nav-user').style.display = 'none';
}

// ── TELAS ────────────────────────────────────────
function mostrarTela(nome) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + nome).classList.add('active');
}
function irParaCadastro() { mostrarTela('cadastro'); limparErros(); }
function irParaLogin()    { mostrarTela('login');    limparErros(); }
function limparErros() {
  document.querySelectorAll('.auth-erro').forEach(e => { e.textContent = ''; e.classList.remove('show'); });
}
function mostrarErro(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.classList.add('show');
}

// ── MÁSCARAS ─────────────────────────────────────
function mascararCpf(el) {
  let v = el.value.replace(/\D/g,'').slice(0,11);
  if (v.length > 9) v = v.slice(0,3)+'.'+v.slice(3,6)+'.'+v.slice(6,9)+'-'+v.slice(9);
  else if (v.length > 6) v = v.slice(0,3)+'.'+v.slice(3,6)+'.'+v.slice(6);
  else if (v.length > 3) v = v.slice(0,3)+'.'+v.slice(3);
  el.value = v;
}

// ── RPC ──────────────────────────────────────────
async function rpc(fn, params) {
  const r = await fetch(`${SB_URL}/rest/v1/rpc/${fn}`, {
    method: 'POST',
    headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify(params)
  });
  const text = await r.text();
  return text ? JSON.parse(text) : {};
}

// ── LOGIN ────────────────────────────────────────
async function fazerLogin() {
  limparErros();
  const cpf   = document.getElementById('login-cpf').value;
  const senha = document.getElementById('login-senha').value;

  if (cpf.replace(/\D/g,'').length !== 11) return mostrarErro('login-erro', 'CPF inválido.');
  if (!senha) return mostrarErro('login-erro', 'Digite sua senha.');

  const btn = document.getElementById('btn-login');
  btn.textContent = 'Entrando...'; btn.disabled = true;

  try {
    const res = await rpc('atleta_login', { p_cpf: cpf, p_senha: senha });
    if (!res.ok) {
      mostrarErro('login-erro', res.erro || 'Erro ao fazer login.');
    } else {
      salvarSessao(res);
      entrarNaArea(res);
    }
  } catch(e) {
    mostrarErro('login-erro', 'Erro de conexão. Tente novamente.');
  }
  btn.textContent = 'Entrar'; btn.disabled = false;
}

// ── CADASTRO ─────────────────────────────────────
async function fazerCadastro() {
  limparErros();
  const nome   = (document.getElementById('cad-nome').value || '').trim();
  const cpf    = document.getElementById('cad-cpf').value;
  const email  = document.getElementById('cad-email').value.trim();
  const senha  = document.getElementById('cad-senha').value;
  const senha2 = document.getElementById('cad-senha2').value;

  if (!nome || nome.split(' ').filter(Boolean).length < 2) return mostrarErro('cad-erro', 'Digite seu nome completo.');
  if (cpf.replace(/\D/g,'').length !== 11) return mostrarErro('cad-erro', 'CPF inválido.');
  if (!email || !email.includes('@')) return mostrarErro('cad-erro', 'E-mail inválido.');
  if (senha.length < 6) return mostrarErro('cad-erro', 'Senha deve ter pelo menos 6 caracteres.');
  if (senha !== senha2) return mostrarErro('cad-erro', 'As senhas não coincidem.');

  const btn = document.getElementById('btn-cad');
  btn.textContent = 'Criando conta...'; btn.disabled = true;

  try {
    const res = await rpc('atleta_cadastrar', { p_cpf: cpf, p_email: email, p_senha: senha, p_nome: nome });
    if (!res.ok) {
      mostrarErro('cad-erro', res.erro || 'Erro ao criar conta.');
    } else {
      const login = await rpc('atleta_login', { p_cpf: cpf, p_senha: senha });
      if (login.ok) { salvarSessao(login); entrarNaArea(login); }
      else irParaLogin();
    }
  } catch(e) {
    mostrarErro('cad-erro', 'Erro de conexão. Tente novamente.');
  }
  btn.textContent = 'Criar conta'; btn.disabled = false;
}

// ── ÁREA ─────────────────────────────────────────
function entrarNaArea(dados) {
  const nome = dados.nome || dados.cpf;
  document.getElementById('area-nome').textContent = nome.split(' ')[0];
  document.getElementById('nav-nome').textContent  = nome.split(' ')[0];
  document.getElementById('nav-user').style.display = 'flex';
  mostrarTela('area');
  carregarInscricoes(dados);
}

async function carregarInscricoes(dados) {
  const wrap = document.getElementById('inscricoes-wrap');
  wrap.innerHTML = '<div class="loading-wrap"><div class="spinner"></div><div>Carregando...</div></div>';

  try {
    const [cpf, hash] = (dados.token || '').split(':');
    const res = await rpc('atleta_minhas_inscricoes', { p_cpf: cpf, p_senha_hash: hash });

    if (!res.ok) { wrap.innerHTML = '<div class="vazio"><div class="vazio-icone">⚠️</div><div class="vazio-texto">Erro ao carregar inscrições.</div></div>'; return; }

    const lista = res.inscricoes || [];
    if (!lista.length) {
      wrap.innerHTML = `
        <div class="vazio">
          <div class="vazio-icone">🏃</div>
          <div class="vazio-texto" style="font-size:18px;font-weight:700;margin-bottom:8px;">Nenhuma inscrição ainda</div>
          <div style="font-size:14px;color:rgba(255,255,255,0.4);margin-bottom:24px;">Quando as inscrições abrirem, você poderá se inscrever rapidamente com seus dados já cadastrados.</div>
          <a href="/" style="background:var(--orange);color:#fff;padding:12px 28px;border-radius:8px;text-decoration:none;font-weight:700;font-size:15px;">Ver eventos</a>
        </div>`;
      return;
    }

    wrap.innerHTML = `<div class="inscricoes-grid">${lista.map(renderInscricao).join('')}</div>`;
    // Gera QR codes após renderizar
    lista.forEach(it => gerarQR(it.id));

  } catch(e) {
    wrap.innerHTML = '<div class="vazio"><div class="vazio-icone">⚠️</div><div class="vazio-texto">Erro de conexão.</div></div>';
  }
}

function statusBadge(s) {
  const map = {
    confirmado: ['status-confirmado', '✓ Confirmado'],
    pendente:   ['status-pendente',   '⏳ Pendente'],
    cancelado:  ['status-cancelado',  '✕ Cancelado'],
  };
  const [cls, txt] = map[s] || ['status-pendente', s];
  return `<span class="insc-status ${cls}">${txt}</span>`;
}

function formatarData(str) {
  if (!str) return '—';
  const d = new Date(str);
  return d.toLocaleDateString('pt-BR', { day:'2-digit', month:'short', year:'numeric' });
}

function formatarValor(v) {
  return 'R$ ' + Number(v).toFixed(2).replace('.', ',');
}

function renderInscricao(it) {
  const desconto = it.desconto_pct ? ` <span style="color:rgba(255,255,255,0.4);font-size:11px;">(-${it.desconto_pct}%)</span>` : '';
  return `
  <div class="insc-card">
    <div class="insc-card-top">
      <div class="insc-evento">${it.evento}</div>
      <div style="margin-top:8px;">${statusBadge(it.status)}</div>
    </div>
    <div class="insc-detalhes">
      <div class="insc-row"><span class="insc-label">Kit</span><span class="insc-val">${it.kit || '—'}</span></div>
      <div class="insc-row"><span class="insc-label">Modalidade</span><span class="insc-val">${it.modalidade || '—'}</span></div>
      <div class="insc-row"><span class="insc-label">Camiseta</span><span class="insc-val">${it.tamanho_camisa || '—'}</span></div>
      <div class="insc-row"><span class="insc-label">Lote</span><span class="insc-val">${it.lote_nome || '—'}</span></div>
      <div class="insc-row"><span class="insc-label">Pagamento</span><span class="insc-val">${it.forma_pagamento || '—'}</span></div>
      <div class="insc-row"><span class="insc-label">Valor</span><span class="insc-val orange">${formatarValor(it.valor)}${desconto}</span></div>
      <div class="insc-row"><span class="insc-label">Data</span><span class="insc-val">${formatarData(it.criado_em)}</span></div>
    </div>
    ${it.status === 'confirmado' ? `
    <div class="insc-qr">
      <div class="insc-qr-titulo">🎫 QR Code — Retirada do kit</div>
      <div class="qr-wrap">
        <canvas id="qr-${it.id}" width="160" height="160"></canvas>
      </div>
      <div class="qr-id">${it.id}</div>
    </div>` : ''}
  </div>`;
}

function gerarQR(id) {
  const canvas = document.getElementById('qr-' + id);
  if (!canvas) return;
  QRCode.toCanvas(canvas, id, {
    width: 160, margin: 0,
    color: { dark: '#000000', light: '#ffffff' }
  });
}

// ── INICIALIZAÇÃO ─────────────────────────────────
(function init() {
  const s = carregarSessao();
  if (s && s.token) { entrarNaArea(s); return; }
  // Se veio com ?tela=cadastro (botão "Cadastre-se" do site), abre direto no cadastro
  const params = new URLSearchParams(window.location.search);
  if (params.get('tela') === 'cadastro') mostrarTela('cadastro');
})();
</script>
